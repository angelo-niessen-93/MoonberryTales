<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonberry Tales - Home</title>
  <link rel="icon" type="image/png" href="./img/favicon.ico.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="home-page">
  <div id="rotate-device-overlay-home" aria-hidden="true">
    <img src="./img/drehen.png" alt="Bitte Geraet drehen">
  </div>
  <button id="main-mute-toggle" type="button" aria-label="Global stumm aktivieren" aria-pressed="false">
    <img src="./img/mute.png" alt="Mute">
  </button>
  <div id="mobile-controls-toggle-wrap" aria-label="Mobile Buttons umschalten">
    <span>Mobile Buttons</span>
    <label class="switch" for="mobile-controls-toggle">
      <input id="mobile-controls-toggle" type="checkbox" checked>
      <span class="switch-slider"></span>
    </label>
  </div>
  <main class="home-layout">
    <img id="main-title-logo" src="./img/logo_main_page.png" alt="Moonberry Tales">

    <button id="start-button" type="button" aria-label="Spiel starten">
      <img src="./img_mainpage\03potions\forward_button.png" alt="Start">
      <span>Start</span>
    </button>
    <div id="audio-control-game" class="audio-control-game">
      <button id="music-toggle" type="button" aria-label="Audio-Menü öffnen" aria-expanded="false">
        <span>Sounds</span>
      </button>
    </div>
    <button id="leaderboard-button" type="button" aria-label="Leaderboard anzeigen">
      Bestenliste
    </button>

    <section id="leaderboard-panel" class="hidden" aria-label="Bestenliste">
      <h2>Leaderboard</h2>
      <button id="leaderboard-close" type="button" aria-label="Leaderboard schließen">Schließen</button>
      <ol id="leaderboard-list"></ol>
      <p id="leaderboard-empty" class="hidden">Noch keine Einträge vorhanden.</p>
    </section>
  </main>
  <div id="home-audio-settings-popup" class="hidden" role="dialog" aria-modal="true" aria-label="Audio-Einstellungen">
    <div class="home-audio-settings-card">
      <img class="home-audio-title" src="./img/14Pause/Pause.png" alt="Einstellungen">
      <div class="home-audio-row">
        <label for="home-music-volume">Musik</label>
        <input id="home-music-volume" type="range" min="0" max="1" step="0.01" value="0.5">
      </div>
      <div class="home-audio-row">
        <label for="home-sfx-volume">Soundeffekte</label>
        <input id="home-sfx-volume" type="range" min="0" max="1" step="0.01" value="0.5">
      </div>
      <button id="home-audio-close" class="home-popup-button" type="button" aria-label="Einstellungen schließen">
        <span>Schließen</span>
      </button>
    </div>
  </div>
  <div id="character-popup" class="hidden" role="dialog" aria-modal="true" aria-label="Heldenauswahl">
    <div class="popup-card">
      <h2>Wähle deinen Helden</h2>
      <div id="characters-container">
        <button class="character" type="button" data-character="Knight" aria-label="Knight auswählen">
          <span>Knight</span>
        </button>
        <button class="character" type="button" data-character="Mage" aria-label="Mage auswählen">
          <span>Mage</span>
        </button>
        <button class="character" type="button" data-character="Rogue" aria-label="Rogue auswählen">
          <span>Rogue</span>
        </button>
      </div>
    </div>
  </div>
  <audio id="main-menu-music" src="./audio/mainpage.mp3" autoplay loop></audio>
  <aside class="promo-banner" aria-label="New level announcement">
    <button id="promo-close" class="promo-close" type="button" aria-label="Close announcement">X</button>
    <span class="promo-badge">NEW</span>
    <p class="promo-text">New Level Now Available. Double Reward. Double Risk.</p>
  </aside>
  <a
    class="github-button"
    href="https://github.com/angelo-niessen-93"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Open Angelo Niessen on GitHub"
  >
    <img src="./img/github.png" alt="GitHub">
  </a>
  <a class="impressum-button" href="./Impressum.html" aria-label="Zum Impressum">Impressum</a>
  <script src="./js/ui/home-character-sprites.js"></script>
  <script src="./js/leaderboard/home-leaderboard.js"></script>
  <script src="./home.js"></script>
</body>
</html>
